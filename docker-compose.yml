version: '3.8'

services:
  # MySQL Database Service
  mysql:
    image: mysql:8.0
    container_name: dailyquestions_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_DATABASE: dailyquestions_db
      MYSQL_USER: devuser
      MYSQL_PASSWORD: devuser_password_123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Node.js Backend Service
  backend:
    build: .
    container_name: dailyquestions_backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: devuser
      DB_PASSWORD: devuser_password_123
      DB_NAME: dailyquestions_db
      NODE_ENV: development
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm start
    restart: unless-stopped

volumes:
  mysql_data:
